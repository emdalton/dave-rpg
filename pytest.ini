# pytest.ini — DAVE RPG Engine Test Suite Configuration
#
# Run the full default (no-LLM) suite:     pytest
# Run with structural LLM tests:           pytest --llm
# Run with qualitative evaluation tests:   pytest --llm-eval
# Run everything:                          pytest --llm --llm-eval
# Coverage report:                         pytest --cov=engine --cov-report=term-missing
#
# Requires pytest >= 7.0 (for pythonpath support).

[pytest]
testpaths = tests
pythonpath = .

# Custom marker declarations (suppresses PytestUnknownMarkWarning)
markers =
    llm: Real LLM call with structural/mechanical assertions. Opt in with --llm. Requires ANTHROPIC_API_KEY.
    llm_eval: Real LLM call + LLM-as-judge quality evaluation. Opt in with --llm-eval. Slow and expensive.
